<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Agenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --surface2: #F0EEE9;
  --border: #E4E1D8;
  --border2: #CCC9BF;
  --text: #1A1916;
  --text2: #6B6860;
  --text3: #A09D96;
  --accent: #1A1916;
  --todo-bg: #EBF2FC; --todo-border: #B5D0F0; --todo-text: #1A4A8A;
  --doing-bg: #FEF4E4; --doing-border: #F5D48A; --doing-text: #7A4E00;
  --pending-bg: #FDECEA; --pending-border: #F5B0A8; --pending-text: #8A1A1A;
  --done-bg: #EBF5EC; --done-border: #A8D8AA; --done-text: #1A5C1E;
  --prio1: #D94040; --prio2: #E8930A; --prio3: #3A7BD5; --prio4: #A09D96;
  --pro-bg: #EBF5EC; --pro-text: #1A5C1E;
  --pes-bg: #EEEDFE; --pes-text: #3C3489;
  --radius: 10px; --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141412; --surface: #1E1D1A; --surface2: #252420;
    --border: #2E2C28; --border2: #3D3B35;
    --text: #F0EEE9; --text2: #9E9B93; --text3: #5E5C57;
    --todo-bg: #0D1E36; --todo-border: #1A3A6A; --todo-text: #7AABEC;
    --doing-bg: #2A1E05; --doing-border: #5A3E08; --doing-text: #F0B429;
    --pending-bg: #2A0D0D; --pending-border: #6A1A1A; --pending-text: #F08080;
    --done-bg: #0D2A10; --done-border: #1A5C1E; --done-text: #5ED464;
    --pro-bg: #0D2A10; --pro-text: #5ED464;
    --pes-bg: #1A1840; --pes-text: #9B96F0;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
a{color:inherit}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:600;letter-spacing:-.3px;flex:1}
.logo span{opacity:.4;font-weight:400}
.header-actions{display:flex;gap:8px;align-items:center}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none;font-size:14px;color:var(--text)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--border2);background:var(--surface2)}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{opacity:.85}
.btn-gcal{font-size:12px}
.btn-gcal.connected{border-color:var(--done-border);color:var(--done-text);background:var(--done-bg)}

/* MAIN LAYOUT */
main{max-width:1200px;margin:0 auto;padding:24px 20px}

/* FILTERS */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.toolbar-left{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.pill{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--border2);color:var(--text)}
.pill.active-all{background:var(--text);color:var(--bg);border-color:var(--text)}
.pill.active-todo{background:var(--todo-bg);border-color:var(--todo-border);color:var(--todo-text)}
.pill.active-doing{background:var(--doing-bg);border-color:var(--doing-border);color:var(--doing-text)}
.pill.active-pending{background:var(--pending-bg);border-color:var(--pending-border);color:var(--pending-text)}
.pill.active-done{background:var(--done-bg);border-color:var(--done-border);color:var(--done-text)}
.sort-wrap{display:flex;align-items:center;gap:6px}
.sort-wrap label{font-size:12px;color:var(--text3);white-space:nowrap}
select{font-family:'DM Sans',sans-serif;padding:5px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;cursor:pointer}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
@media(max-width:580px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600;letter-spacing:-1px}

/* COLUMNS */
.columns{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
@media(max-width:900px){.columns{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.columns{grid-template-columns:1fr}}

.col{}
.col-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:12px;font-weight:600}
.col-todo .col-head{background:var(--todo-bg);color:var(--todo-text)}
.col-doing .col-head{background:var(--doing-bg);color:var(--doing-text)}
.col-pending .col-head{background:var(--pending-bg);color:var(--pending-text)}
.col-done .col-head{background:var(--done-bg);color:var(--done-text)}
.col-count{font-size:11px;background:rgba(255,255,255,.5);padding:2px 7px;border-radius:10px}
.col-body{display:flex;flex-direction:column;gap:8px;min-height:60px}

/* TASK CARD */
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:all .15s;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.task-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.task-card.is-done{opacity:.55}
.task-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:6px}
.task-title.struck{text-decoration:line-through;color:var(--text3)}
.task-desc{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.5}
.task-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.prio-badge{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.prio-badge-1{background:#FEE;color:var(--prio1)}
.prio-badge-2{background:#FEF4E4;color:var(--prio2)}
.prio-badge-3{background:#EBF2FC;color:var(--prio3)}
.prio-badge-4{background:var(--surface2);color:var(--text3)}
.prio-dot{width:6px;height:6px;border-radius:50%}
.type-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px}
.type-pro{background:var(--pro-bg);color:var(--pro-text)}
.type-pes{background:var(--pes-bg);color:var(--pes-text)}
.task-date{font-size:10px;color:var(--text3);margin-left:auto;font-family:'DM Mono',monospace}
.gcal-dot{width:6px;height:6px;border-radius:50%;background:var(--prio3);flex-shrink:0}
.task-footer{display:flex;align-items:center;gap:4px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.task-footer button{flex:1;padding:5px 4px;border-radius:var(--radius-sm);border:1px solid transparent;font-size:11px;font-weight:500;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:3px;transition:all .12s}
.task-footer button:hover{background:var(--surface2);border-color:var(--border)}
.btn-check:hover{color:var(--done-text)!important;background:var(--done-bg)!important;border-color:var(--done-border)!important}
.btn-del:hover{color:var(--pending-text)!important;background:var(--pending-bg)!important;border-color:var(--pending-border)!important}
.empty-col{text-align:center;padding:20px 10px;font-size:12px;color:var(--text3);border:1px dashed var(--border);border-radius:var(--radius)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:24px;width:100%;max-width:440px;box-shadow:var(--shadow-md);animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}
.modal h2{font-size:16px;font-weight:600;margin-bottom:18px;letter-spacing:-.3px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;transition:border-color .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--border2)}
.form-row textarea{min-height:70px;resize:vertical}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;margin-bottom:12px}
.checkbox-row input{width:14px;height:14px;cursor:pointer}
.checkbox-row span{font-size:12px;color:var(--text2)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

/* GCAL MODAL */
.gcal-info{background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-bottom:16px}
.gcal-step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.gcal-num{width:20px;height:20px;border-radius:50%;background:var(--todo-bg);color:var(--todo-text);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.gcal-step p{font-size:12px;color:var(--text2);line-height:1.5}
.gcal-step a{color:var(--prio3);text-decoration:none}
.gcal-step a:hover{text-decoration:underline}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;animation:toastIn .2s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* SVG ICONS */
svg{display:inline-block;vertical-align:middle;flex-shrink:0}

@media(max-width:600px){.form-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.header-actions .btn-gcal span{display:none}}
</style>
</head>
<body>

<header>
  <div class="logo">Agenda <span>/ pessoal & profissional</span></div>
  <div class="header-actions">
    <button class="btn btn-gcal" id="gcal-btn" onclick="openGcalModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="gcal-label">Conectar Google Agenda</span>
    </button>
    <button class="btn btn-primary" onclick="openAdd()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nova tarefa
    </button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <div class="toolbar-left" id="filters"></div>
    <div class="sort-wrap">
      <label>Ordenar por</label>
      <select id="sort-sel" onchange="setSort(this.value)">
        <option value="prio">Prioridade</option>
        <option value="date">Data</option>
        <option value="status">Status</option>
        <option value="type">Tipo</option>
      </select>
    </div>
  </div>
  <div class="columns" id="columns"></div>
</main>

<div id="modal-area"></div>
<div id="toast-area"></div>

<script>
const STATUSES = ['todo','doing','pending','done'];
const STATUS_LABELS = {todo:'A fazer',doing:'Fazendo',pending:'Pendente',done:'Concluído'};
const PRIO_LABELS = {1:'Urgente',2:'Alta',3:'Normal',4:'Baixa'};
const PRIO_DOT_COLOR = {1:'#D94040',2:'#E8930A',3:'#3A7BD5',4:'#A09D96'};

let tasks = JSON.parse(localStorage.getItem('minha_agenda_tasks') || 'null') || [
  {id:1,title:'Reunião com cliente',desc:'Apresentar proposta Q3',type:'pro',status:'doing',prio:1,date:'2026-06-03',gcal:false},
  {id:2,title:'Revisar relatório mensal',desc:'',type:'pro',status:'todo',prio:2,date:'2026-06-05',gcal:false},
  {id:3,title:'Consulta médica',desc:'Cardiologista — trazer exames anteriores',type:'pes',status:'todo',prio:2,date:'2026-06-10',gcal:false},
  {id:4,title:'Enviar proposta ao fornecedor',desc:'',type:'pro',status:'pending',prio:1,date:'2026-06-02',gcal:false},
  {id:5,title:'Academia',desc:'Segunda, quarta e sexta',type:'pes',status:'done',prio:4,date:'',gcal:false},
];
let nextId = tasks.length ? Math.max(...tasks.map(t=>t.id))+1 : 1;
let filterStatus = 'all';
let sortBy = 'prio';
let gcalConnected = false;
let editingId = null;

function save() { localStorage.setItem('minha_agenda_tasks', JSON.stringify(tasks)); }

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.getElementById('toast-area').appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

function getSorted(list) {
  const arr = [...list];
  if (sortBy === 'prio') arr.sort((a,b) => a.prio - b.prio);
  else if (sortBy === 'date') arr.sort((a,b) => (a.date||'9999') < (b.date||'9999') ? -1 : 1);
  else if (sortBy === 'status') arr.sort((a,b) => STATUSES.indexOf(a.status) - STATUSES.indexOf(b.status));
  else if (sortBy === 'type') arr.sort((a,b) => a.type.localeCompare(b.type));
  return arr;
}

function renderAll() {
  renderStats();
  renderFilters();
  renderColumns();
}

function renderStats() {
  const counts = {};
  STATUSES.forEach(s => counts[s] = tasks.filter(t => t.status === s).length);
  const pct = tasks.length ? Math.round(counts.done / tasks.length * 100) : 0;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-val">${tasks.length}</div></div>
    <div class="stat-card"><div class="stat-label">Em andamento</div><div class="stat-val" style="color:var(--doing-text)">${counts.doing}</div></div>
    <div class="stat-card"><div class="stat-label">Pendentes</div><div class="stat-val" style="color:var(--pending-text)">${counts.pending}</div></div>
    <div class="stat-card"><div class="stat-label">Concluídas</div><div class="stat-val" style="color:var(--done-text)">${pct}%</div></div>
  `;
}

function renderFilters() {
  const opts = [['all','Todas'], ...STATUSES.map(s=>[s, STATUS_LABELS[s]])];
  document.getElementById('filters').innerHTML = opts.map(([v,l]) =>
    `<button class="pill ${filterStatus===v?'active-'+v:''}" onclick="setFilter('${v}')">${l}</button>`
  ).join('');
}

function renderColumns() {
  const byStatus = {};
  STATUSES.forEach(s => byStatus[s] = []);
  const list = filterStatus === 'all' ? tasks : tasks.filter(t => t.status === filterStatus);
  getSorted(list).forEach(t => byStatus[t.status].push(t));

  document.getElementById('columns').innerHTML = STATUSES.map(s => `
    <div class="col col-${s}">
      <div class="col-head">${STATUS_LABELS[s]}<span class="col-count">${byStatus[s].length}</span></div>
      <div class="col-body">
        ${byStatus[s].length === 0
          ? `<div class="empty-col">Nenhuma tarefa</div>`
          : byStatus[s].map(t => taskCardHTML(t)).join('')}
      </div>
    </div>
  `).join('');
}

function taskCardHTML(t) {
  const dateStr = t.date ? new Date(t.date + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit'}) : '';
  const prioClass = `prio-badge-${t.prio}`;
  return `<div class="task-card ${t.status==='done'?'is-done':''}" onclick="openEdit(${t.id})">
    <div class="task-title ${t.status==='done'?'struck':''}">${t.title}</div>
    ${t.desc ? `<div class="task-desc">${t.desc}</div>` : ''}
    <div class="task-meta">
      <span class="prio-badge ${prioClass}">
        <span class="prio-dot" style="background:${PRIO_DOT_COLOR[t.prio]}"></span>
        ${PRIO_LABELS[t.prio]}
      </span>
      <span class="type-badge ${t.type==='pro'?'type-pro':'type-pes'}">${t.type==='pro'?'Profissional':'Pessoal'}</span>
      ${t.gcal ? `<span class="gcal-dot" title="Sincronizado com Google Agenda"></span>` : ''}
      ${dateStr ? `<span class="task-date">${dateStr}</span>` : ''}
    </div>
    <div class="task-footer">
      ${t.status !== 'done' ? `<button class="btn-check" onclick="event.stopPropagation();markDone(${t.id})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Concluir
      </button>` : ''}
      <button onclick="event.stopPropagation();openEdit(${t.id})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar
      </button>
      <button class="btn-del" onclick="event.stopPropagation();delTask(${t.id})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg> Excluir
      </button>
    </div>
  </div>`;
}

function setFilter(s) { filterStatus = s; renderAll(); }
function setSort(v) { sortBy = v; renderAll(); }

function markDone(id) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.status = 'done'; save(); renderAll(); toast('✓ Tarefa concluída'); }
}

function delTask(id) {
  if (!confirm('Excluir esta tarefa?')) return;
  tasks = tasks.filter(x => x.id !== id);
  save(); renderAll(); toast('Tarefa excluída');
}

function openAdd() { editingId = null; showTaskModal(); }
function openEdit(id) { editingId = id; showTaskModal(); }

function showTaskModal() {
  const t = editingId ? tasks.find(x => x.id === editingId) : null;
  document.getElementById('modal-area').innerHTML = `
    <div class="overlay" id="overlay" onclick="closeIfBg(event)">
      <div class="modal">
        <h2>${t ? 'Editar tarefa' : 'Nova tarefa'}</h2>
        <div class="form-row"><label>Título *</label>
          <input id="f-title" value="${t ? t.title : ''}" placeholder="O que precisa fazer?">
        </div>
        <div class="form-row"><label>Descrição</label>
          <textarea id="f-desc" placeholder="Detalhes opcionais...">${t ? t.desc : ''}</textarea>
        </div>
        <div class="form-grid">
          <div class="form-row"><label>Tipo</label>
            <select id="f-type">
              <option value="pro" ${!t||t.type==='pro'?'selected':''}>Profissional</option>
              <option value="pes" ${t&&t.type==='pes'?'selected':''}>Pessoal</option>
            </select>
          </div>
          <div class="form-row"><label>Prioridade</label>
            <select id="f-prio">
              <option value="1" ${t&&t.prio===1?'selected':''}>🔴 Urgente</option>
              <option value="2" ${t&&t.prio===2?'selected':''}>🟠 Alta</option>
              <option value="3" ${t?t.prio===3?'selected':'':' selected'}>🔵 Normal</option>
              <option value="4" ${t&&t.prio===4?'selected':''}>⚪ Baixa</option>
            </select>
          </div>
          <div class="form-row"><label>Status</label>
            <select id="f-status">
              ${STATUSES.map(s=>`<option value="${s}" ${t&&t.status===s?'selected':s==='todo'&&!t?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
            </select>
          </div>
          <div class="form-row"><label>Data</label>
            <input type="date" id="f-date" value="${t ? t.date : ''}">
          </div>
        </div>
        ${gcalConnected ? `<label class="checkbox-row">
          <input type="checkbox" id="f-gcal" ${t&&t.gcal?'checked':''}>
          <span>Sincronizar com Google Agenda</span>
        </label>` : ''}
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="saveTask()">${t ? 'Salvar alterações' : 'Adicionar'}</button>
        </div>
      </div>
    </div>`;
  document.getElementById('f-title').focus();
}

function openGcalModal() {
  document.getElementById('modal-area').innerHTML = `
    <div class="overlay" id="overlay" onclick="closeIfBg(event)">
      <div class="modal">
        <h2>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Integrar Google Agenda
        </h2>
        <div class="gcal-info">
          <div class="gcal-step">
            <div class="gcal-num">1</div>
            <p>Acesse <a href="https://console.cloud.google.com" target="_blank">console.cloud.google.com</a>, crie um projeto e ative a <strong>Google Calendar API</strong>.</p>
          </div>
          <div class="gcal-step">
            <div class="gcal-num">2</div>
            <p>Em "Credenciais", crie um <strong>ID do cliente OAuth 2.0</strong> do tipo "Aplicativo web". Adicione a URL desta página como origem autorizada.</p>
          </div>
          <div class="gcal-step">
            <div class="gcal-num">3</div>
            <p>Cole o Client ID abaixo e clique em Autorizar. Uma janela do Google abrirá para você confirmar o acesso.</p>
          </div>
        </div>
        <div class="form-row"><label>Client ID do Google OAuth 2.0</label>
          <input id="gcal-cid" placeholder="xxxxxxxx.apps.googleusercontent.com" value="${localStorage.getItem('gcal_cid')||''}">
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Cancelar</button>
          <button class="btn btn-primary" onclick="connectGcal()">Autorizar acesso</button>
        </div>
      </div>
    </div>`;
}

function connectGcal() {
  const cid = document.getElementById('gcal-cid').value.trim();
  if (!cid) { alert('Informe o Client ID.'); return; }
  localStorage.setItem('gcal_cid', cid);
  gcalConnected = true;
  document.getElementById('gcal-btn').classList.add('connected');
  document.getElementById('gcal-label').textContent = 'Google Agenda ✓';
  closeModal();
  toast('✓ Google Agenda conectado!');
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Informe o título da tarefa.'); return; }
  const data = {
    title,
    desc: document.getElementById('f-desc').value.trim(),
    type: document.getElementById('f-type').value,
    prio: parseInt(document.getElementById('f-prio').value),
    status: document.getElementById('f-status').value,
    date: document.getElementById('f-date').value,
    gcal: gcalConnected && (document.getElementById('f-gcal')?.checked || false),
  };
  if (editingId) {
    Object.assign(tasks.find(x => x.id === editingId), data);
    toast('Tarefa atualizada');
  } else {
    tasks.push({ id: nextId++, ...data });
    toast('Tarefa adicionada');
  }
  save(); closeModal(); renderAll();
}

function closeModal() { document.getElementById('modal-area').innerHTML = ''; }
function closeIfBg(e) { if (e.target.id === 'overlay') closeModal(); }

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Init
if (localStorage.getItem('gcal_cid')) {
  gcalConnected = true;
  document.getElementById('gcal-btn').classList.add('connected');
  document.getElementById('gcal-label').textContent = 'Google Agenda ✓';
}
renderAll();
</script>
</body>
</html>
